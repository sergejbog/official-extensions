<a
  class="home-feed-card ext-card"
  href="{{itemUrl}}"
  target="_blank"
  rel="noopener"
>
  {{image}}
  <div class="home-feed-card-body">
    <div class="home-feed-card-meta">
      {{favicon}}
      <span class="home-feed-card-source">{{source}}</span>
      {{datePart}}
    </div>
    <div class="home-feed-card-title">{{title}}</div>
  </div>
</a>
