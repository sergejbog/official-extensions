<div class="command-result colors-command degoog-panel" data-seeds="{{seeds}}">
  <div class="colors-toolbar degoog-panel--slot-body-padded">
    <label class="degoog-select-wrap colors-style-wrap">
      <select class="colors-style degoog-input" aria-label="Palette style">
        <option value="all">All</option>
        <option value="vibrant" selected>Vibrant</option>
        <option value="pastel">Pastel</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
      </select>
    </label>
    <span class="colors-hint degoog-badge">{{ t:plugin-colors.hint }}</span>
  </div>
  <div class="colors-boxes boxes" role="group" aria-label="Color palette">
    <div class="box" data-index="0">
      <span class="colors-lock" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
      <button type="button" class="color colors-hex" aria-label="Copy hex color"></button>
    </div>
    <div class="box" data-index="1">
      <span class="colors-lock" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
      <button type="button" class="color colors-hex" aria-label="Copy hex color"></button>
    </div>
    <div class="box" data-index="2">
      <span class="colors-lock" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
      <button type="button" class="color colors-hex" aria-label="Copy hex color"></button>
    </div>
    <div class="box" data-index="3">
      <span class="colors-lock" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
      <button type="button" class="color colors-hex" aria-label="Copy hex color"></button>
    </div>
    <div class="box" data-index="4">
      <span class="colors-lock" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
      <button type="button" class="color colors-hex" aria-label="Copy hex color"></button>
    </div>
  </div>
</div>
