<div class="result-item degoog-result">
  <div class="result-item-inner degoog-result--inner">
    {{thumbnail_block}}
    <div class="result-body degoog-result--body">
      <div class="result-url-row degoog-result--url-row">
        <img
          id="result-favicon-{{index}}"
          class="result-favicon degoog-result--favicon"
          src="{{favicon_url}}"
          data-favicon-host="{{favicon_host}}"
          alt=""
          width="26"
          height="26"
        />
        <cite class="result-cite degoog-result--cite">{{cite_url}}</cite>
      </div>
      <a
        class="result-title degoog-result--title"
        href="{{url}}"
        target="{{link_target}}"
        rel="{{link_rel}}"
        >{{title}}</a
      >
      <p class="result-snippet degoog-result--snippet">{{snippet}}</p>
      <div class="result-engines degoog-result--engines">{{sources}}</div>
    </div>
  </div>
</div>
